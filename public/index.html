<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UGC AI Video | Premium CRM</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.2);
            --primary-gradient: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Abstract background shapes */
        .bg-blob {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: #3b82f6;
            top: -100px;
            right: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: #ef4444;
            bottom: -50px;
            left: -50px;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 30px) scale(1.1); }
        }

        .container {
            width: 90%;
            max-width: 1000px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 60px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 24px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-wrapper:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .logo-wrapper img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #0f172a 30%, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6;
        }

        .card-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .icon-order { background: #eff6ff; color: #3b82f6; }
        .icon-track { background: #fdf2f8; color: #db2777; }
        .icon-admin { background: #f8fafc; color: #64748b; }

        .card h3 {
            font-size: 1.25rem;
            color: #0f172a;
            font-weight: 600;
        }

        .card span {
            font-size: 0.9rem;
            color: #94a3b8;
            text-align: center;
        }

        .admin-link {
            margin-top: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 99px;
            transition: all 0.2s;
        }

        .admin-link:hover {
            background: #f1f5f9;
            color: #0f172a;
        }

        @media (max-width: 640px) {
            h1 { font-size: 2.5rem; }
            .container { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="container">
        <div class="logo-wrapper">
            <img src="assets/logo.png" alt="UGC Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/10335/10335805.png'">
        </div>
        <h1>Manas CRM</h1>
        <p>Premium UGC AI Video management portal. Streamline your production, track orders in real-time, and manage your team efficiently.</p>
        
        <div class="action-grid">
            <a href="order.html" class="card">
                <div class="card-icon icon-order">
                    <i class="fas fa-plus-circle"></i>
                </div>
                <h3>Place New Order</h3>
                <span>Create a new video production request in seconds.</span>
            </a>
            
            <a href="track.html" class="card">
                <div class="card-icon icon-track">
                    <i class="fas fa-radar"></i>
                </div>
                <h3>Track Status</h3>
                <span>Check your queue position and estimated delivery time.</span>
            </a>
        </div>

        <a href="admin.html" class="admin-link">
            <i class="fas fa-shield-halved"></i>
            Admin Control Panel
        </a>
    </div>
</body>
</html>
